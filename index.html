<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>블루모닝 유니티 콘텐츠 제작소</title>
    <meta name="description" content="유니티 기반 3D 콘텐츠, XR, 메타버스 제작 전문 기업 블루모닝 사이트입니다.">

    <style>
        /* ================= Reset & Base ================= */
        :root {
            --bg-color: #0d0d0d;
            --surface-color: #1a1a1a;
            --text-primary: #f5f5f5;
            --text-secondary: #aaaaaa;
            --accent-color: #fff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            line-height: 1.6;
            overflow-x: hidden;
        }

        a { text-decoration: none; color: inherit; }
        ul { list-style: none; }

        /* ================= Header ================= */
        header {
            position: fixed;
            top: 0; left: 0; width: 100%;
            padding: 20px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            transition: background 0.3s, backdrop-filter 0.3s;
        }

        header.scrolled {
            background: rgba(13, 13, 13, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .logo { font-size: 1.5rem; font-weight: 800; letter-spacing: 1px; }

        .nav-links { display: flex; gap: 30px; }
        .nav-links li a { font-size: 1rem; font-weight: 500; transition: color 0.3s; }
        .nav-links li a:hover { color: var(--text-secondary); }

        /* ================= Hero Section ================= */
        #hero {
            position: relative;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            overflow: hidden;
        }

        .video-bg-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -2;
            overflow: hidden;
            background-color: #000;
        }

        .video-bg-container iframe {
            position: absolute;
            top: 50%; left: 50%;
            width: 100vw; height: 56.25vw;
            min-height: 100vh; min-width: 177.77vh;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }

        .video-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6); z-index: -1;
        }

        .hero-content h1 { font-size: 3.5rem; font-weight: 800; margin-bottom: 20px; animation: fadeInDown 1s ease; }
        .hero-content p { font-size: 1.2rem; color: var(--text-secondary); animation: fadeInUp 1s ease 0.3s forwards; opacity: 0; }

        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* ================= Section Layout ================= */
        section:not(#hero) { padding: 100px 10vw; }
        .section-title { font-size: 2.5rem; font-weight: 700; margin-bottom: 50px; text-align: center; }

        /* ================= About Section ================= */
        .about-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 30px; }
        .about-card { background: var(--surface-color); padding: 40px 30px; border-radius: 12px; text-align: center; transition: transform 0.3s; }
        .about-card:hover { transform: translateY(-10px); }
        .about-card i { font-size: 3rem; margin-bottom: 20px; color: var(--accent-color); }
        .about-card h3 { font-size: 1.3rem; margin-bottom: 15px; }
        .about-card p { color: var(--text-secondary); font-size: 0.95rem; }

        /* ================= Portfolio Section ================= */
        .portfolio-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .portfolio-item { position: relative; border-radius: 12px; overflow: hidden; aspect-ratio: 16 / 9; cursor: pointer; }
        .portfolio-item img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s ease; }
        .portfolio-overlay {
            position: absolute; inset: 0; background: rgba(0, 0, 0, 0.8);
            display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.3s ease;
        }
        .portfolio-item:hover img { transform: scale(1.05); }
        .portfolio-item:hover .portfolio-overlay { opacity: 1; }
        .portfolio-overlay h3 { font-size: 1.1rem; padding: 0 20px; text-align: center; transform: translateY(20px); transition: transform 0.3s ease; }
        .portfolio-item:hover .portfolio-overlay h3 { transform: translateY(0); }

        /* ================= Tech Stack Section ================= */
        #tech { background-color: var(--surface-color); }
        .tech-container { display: flex; justify-content: center; gap: 40px; flex-wrap: wrap; }
        .tech-item { display: flex; flex-direction: column; align-items: center; gap: 12px; width: 110px; color: var(--text-secondary); transition: color 0.3s, transform 0.3s; }
        .tech-item:hover { color: var(--accent-color); transform: translateY(-5px); }
        .tech-item i { font-size: 3.5rem; }
        .tech-item span { font-size: 0.95rem; font-weight: 600; text-align: center; }

        /* ================= Contact Section ================= */
        .contact-container { text-align: center; max-width: 600px; margin: 0 auto; }
        .contact-container p { color: var(--text-secondary); margin-bottom: 40px; font-size: 1.1rem; }
